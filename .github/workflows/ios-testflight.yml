name: iOS TestFlight

# vX.Y.Z bicimindeki tag push edilince calisir; IPA derler ve TestFlight'a yukler.
on:
  push:
    tags:
      - 'v*'
  # Tag yakmadan elle test/yeniden deneme icin (Actions > Run workflow)
  workflow_dispatch:

jobs:
  testflight:
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode 26 sec (Apple iOS 26 SDK zorunlulugu)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Flutter kurulumu
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true

      - name: Bagimliliklar (SPM kapali; flutter_local_notifications uyumu)
        run: |
          flutter config --no-enable-swift-package-manager
          flutter pub get

      - name: iOS projesini hazirla (configs + pod install)
        run: flutter build ios --config-only --release --no-codesign

      - name: Dagitim sertifikasini dosyaya yaz
        env:
          CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12 }}
        run: echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/dist_cert.p12"

      - name: TestFlight'a derle ve yukle (fastlane)
        working-directory: ios
        env:
          CERT_PATH: ${{ runner.temp }}/dist_cert.p12
          CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
          ASC_KEY_PATH: ${{ runner.temp }}/asc_key.p8
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "$ASC_KEY_PATH"
          bundle install
          bundle exec fastlane beta
