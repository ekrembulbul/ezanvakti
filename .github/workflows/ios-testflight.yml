name: iOS TestFlight

# vX.Y.Z (iki platform) veya ios-vX.Y.Z (sadece iOS) tag'inde calisir; IPA derleyip
# TestFlight'a yukler. android-v* tag'i bu workflow'u tetiklemez.
on:
  push:
    tags:
      - 'v*'
      - 'ios-v*'
  # Tag yakmadan elle test/yeniden deneme icin (Actions > Run workflow)
  workflow_dispatch:

jobs:
  testflight:
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode 26 sec (Apple iOS 26 SDK zorunlulugu)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Flutter kurulumu
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true

      - name: Bagimliliklar (SPM kapali; flutter_local_notifications uyumu)
        run: |
          flutter config --no-enable-swift-package-manager
          flutter pub get

      - name: iOS projesini hazirla (configs + pod install)
        run: flutter build ios --config-only --release --no-codesign

      - name: Dagitim sertifikasini dosyaya yaz
        env:
          CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12 }}
        run: echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/dist_cert.p12"

      - name: App Store provisioning profile'i kur
        env:
          PROFILE_B64: ${{ secrets.IOS_APPSTORE_PROFILE_BASE64 }}
        run: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "$PROFILE_B64" | base64 --decode > "$RUNNER_TEMP/appstore.mobileprovision"
          UUID=$(security cms -D -i "$RUNNER_TEMP/appstore.mobileprovision" | plutil -extract UUID raw -)
          cp "$RUNNER_TEMP/appstore.mobileprovision" "$PROFILES_DIR/$UUID.mobileprovision"
          echo "Profil kuruldu (UUID: $UUID)"

      - name: TestFlight'a derle ve yukle (fastlane)
        working-directory: ios
        env:
          CERT_PATH: ${{ runner.temp }}/dist_cert.p12
          CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          bundle install
          bundle exec fastlane beta
